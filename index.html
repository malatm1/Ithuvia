<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ithuvia | The Future of Connection</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-primary: #ffffff;
            --text-secondary: #a1a1a1;
            --accent-color: #3b82f6; /* Modern Electric Blue */
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        /* Subtle background glow for that 'AI' feel */
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -1px;
            text-transform: lowercase;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .nav-link:hover {
            opacity: 1;
        }

        main {
            text-align: center;
            max-width: 800px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            line-height: 1.1;
            font-weight: 800;
            margin-bottom: 24px;
            letter-spacing: -0.04em;
        }

        .subtext {
            font-size: clamp(1rem, 4vw, 1.25rem);
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn-primary {
            background-color: var(--text-primary);
            color: var(--bg-color);
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            background-color: #f0f0f0;
        }

        @media (max-width: 600px) {
            h1 {
                text-align: left;
            }
            .subtext {
                text-align: left;
            }
            .cta-container {
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <nav>
        <div class="logo">ithuvia</div>
        <a href="#" class="nav-link">Manifesto</a>
    </nav>

    <main>
        <h1>Email is where work goes to die.</h1>
        <p class="subtext">
            AI-driven social ecosystems are where the future is being built in real-time. 
            Ithuvia is a social network, not a mailing list.
        </p>
        
        <div class="cta-container">
            <a href="#" class="btn-primary">Join the Inner Circle</a>
        </div>
    </main>

</body>
</html>
