    body::before {

    .scanline-bar {
      width: 100%; height: 100px;

      position: fixed; top: 0; left: 0; animation: scanline 10s linear infinite; z-index: 9998; pointer-events: none;

    .typing-effect {
      display: inline-block; overflow: hidden; border-right: .15em solid #d97706; white-space: nowrap;

    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #d97706 } }
  </style>
